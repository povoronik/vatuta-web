<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vatuta — Orquestando tu red</title>
<meta name="description" content="Vatuta — Orquestando tu red. Próximamente.">
<meta name="theme-color" content="#07080c">
<meta property="og:title" content="Vatuta — Orquestando tu red">
<meta property="og:description" content="Próximamente.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2307080c'/%3E%3Ccircle cx='16' cy='16' r='4' fill='%235eead4'/%3E%3Ccircle cx='7' cy='8' r='2' fill='%23a78bfa'/%3E%3Ccircle cx='25' cy='9' r='2' fill='%23a78bfa'/%3E%3Ccircle cx='8' cy='24' r='2' fill='%23a78bfa'/%3E%3Ccircle cx='24' cy='24' r='2' fill='%23a78bfa'/%3E%3Cg stroke='%235eead4' stroke-width='1' opacity='.5'%3E%3Cline x1='16' y1='16' x2='7' y2='8'/%3E%3Cline x1='16' y1='16' x2='25' y2='9'/%3E%3Cline x1='16' y1='16' x2='8' y2='24'/%3E%3Cline x1='16' y1='16' x2='24' y2='24'/%3E%3C/g%3E%3C/svg%3E">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#07080c; --ink:#eef1f6; --muted:#8b93a7;
    --teal:#5eead4; --violet:#a78bfa;
  }
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100dvh; display:flex; align-items:center; justify-content:center;
    text-align:center; overflow:hidden; position:relative; padding:24px;
    -webkit-font-smoothing:antialiased;
  }
  canvas#net{position:fixed; inset:0; width:100%; height:100%; z-index:0; opacity:.55}
  .glow{
    position:fixed; z-index:0; border-radius:50%; filter:blur(90px); opacity:.28; pointer-events:none;
  }
  .glow.a{width:420px;height:420px;background:var(--teal);top:-120px;left:-80px}
  .glow.b{width:460px;height:460px;background:var(--violet);bottom:-140px;right:-100px}
  main{position:relative; z-index:1; max-width:640px}
  .badge{
    display:inline-flex; align-items:center; gap:8px;
    font-size:.72rem; letter-spacing:.18em; text-transform:uppercase;
    color:var(--muted); border:1px solid rgba(255,255,255,.12);
    padding:7px 14px; border-radius:999px; margin-bottom:34px;
    background:rgba(255,255,255,.02);
  }
  .badge .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);
    box-shadow:0 0 0 0 rgba(94,234,212,.6); animation:pulse 2.2s infinite}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(94,234,212,.55)}
    70%{box-shadow:0 0 0 10px rgba(94,234,212,0)}
    100%{box-shadow:0 0 0 0 rgba(94,234,212,0)}
  }
  h1{
    font-size:clamp(3.2rem,14vw,7rem); font-weight:800; line-height:.95;
    letter-spacing:-.04em; margin-bottom:22px;
    background:linear-gradient(120deg,#fff 20%,var(--teal) 60%,var(--violet) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .tagline{
    font-size:clamp(1.05rem,4.5vw,1.6rem); font-weight:500; color:var(--ink);
    letter-spacing:-.01em; margin-bottom:14px;
  }
  .tagline b{
    background:linear-gradient(90deg,var(--teal),var(--violet));
    -webkit-background-clip:text; background-clip:text; color:transparent; font-weight:700;
  }
  .sub{color:var(--muted); font-size:clamp(.95rem,3.6vw,1.05rem); line-height:1.6; max-width:440px; margin:0 auto}
  .contact{
    display:inline-block; margin-top:30px; font-size:.92rem; letter-spacing:.02em;
    color:var(--ink); text-decoration:none;
    border:1px solid rgba(255,255,255,.14); border-radius:999px; padding:9px 18px;
    transition:border-color .2s ease, color .2s ease, background .2s ease;
  }
  .contact:hover{border-color:var(--teal); color:var(--teal); background:rgba(94,234,212,.06)}
  footer{
    position:fixed; bottom:22px; left:0; right:0; z-index:1;
    color:var(--muted); font-size:.8rem; letter-spacing:.02em;
  }
  footer a{color:var(--muted); text-decoration:none}
  @media (prefers-reduced-motion:reduce){
    canvas#net{display:none}
    .badge .dot{animation:none}
  }
</style>
</head>
<body>
  <div class="glow a"></div>
  <div class="glow b"></div>
  <canvas id="net" aria-hidden="true"></canvas>

  <main>
    <span class="badge"><span class="dot"></span>Próximamente</span>
    <h1>vatuta</h1>
    <p class="tagline">Orquestando <b>tu red</b>.</p>
    <p class="sub">Estamos construyendo algo especial para conectar y coordinar todo tu ecosistema. Muy pronto.</p>
    <a class="contact" href="mailto:info@plur.ar">info@plur.ar</a>
  </main>

  <footer>vatuta.ar</footer>

<script>
(function(){
  var c=document.getElementById('net');
  if(!c || window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  var x=c.getContext('2d'), w,h,dpr,nodes,raf;
  function size(){
    dpr=Math.min(window.devicePixelRatio||1,2);
    w=c.width=innerWidth*dpr; h=c.height=innerHeight*dpr;
    c.style.width=innerWidth+'px'; c.style.height=innerHeight+'px';
    var n=Math.min(70,Math.round(innerWidth*innerHeight/16000));
    nodes=[];
    for(var i=0;i<n;i++){
      nodes.push({
        x:Math.random()*w, y:Math.random()*h,
        vx:(Math.random()-.5)*.25*dpr, vy:(Math.random()-.5)*.25*dpr,
        r:(Math.random()*1.6+.6)*dpr
      });
    }
  }
  function step(){
    x.clearRect(0,0,w,h);
    var maxd=140*dpr;
    for(var i=0;i<nodes.length;i++){
      var a=nodes[i];
      a.x+=a.vx; a.y+=a.vy;
      if(a.x<0||a.x>w)a.vx*=-1;
      if(a.y<0||a.y>h)a.vy*=-1;
      for(var j=i+1;j<nodes.length;j++){
        var b=nodes[j], dx=a.x-b.x, dy=a.y-b.y, d=Math.hypot(dx,dy);
        if(d<maxd){
          x.strokeStyle='rgba(120,180,200,'+(1-d/maxd)*.16+')';
          x.lineWidth=dpr;
          x.beginPath(); x.moveTo(a.x,a.y); x.lineTo(b.x,b.y); x.stroke();
        }
      }
    }
    for(var k=0;k<nodes.length;k++){
      var p=nodes[k];
      x.beginPath(); x.arc(p.x,p.y,p.r,0,6.2832);
      x.fillStyle='rgba(94,234,212,.55)'; x.fill();
    }
    raf=requestAnimationFrame(step);
  }
  function start(){ cancelAnimationFrame(raf); size(); step(); }
  addEventListener('resize',start,{passive:true});
  start();
})();
</script>
</body>
</html>
